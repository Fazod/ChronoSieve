name: ChronoSieve
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    iOS: "26.0"
    watchOS: "10.0"
settings:
  base:
    SWIFT_VERSION: 5.10
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: Y9ARKG2EC6

targets:
  ChronoSieve:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/iOS
      - path: Sources/Shared
    dependencies:
      - target: ChronoSieveWatch
    info:
      path: Resources/iOS/Info.plist
      properties:
        CFBundleDisplayName: ChronoSieve
        UILaunchScreen: {}
        NSCalendarsUsageDescription: "ChronoSieve needs access to your calendars to filter and display events."
        NSCalendarsFullAccessUsageDescription: "ChronoSieve needs full access to your calendars to read and filter your events."
        NSContactsUsageDescription: "ChronoSieve uses your contacts to show photos of event attendees."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fdenk.chronosieve
        TARGETED_DEVICE_FAMILY: "1,2"

  ChronoSieveWatch:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "10.0"
    dependencies:
      - target: ChronoSieveWatchExtension
    info:
      path: Resources/watchOS/Info.plist
      properties:
        CFBundleDisplayName: ChronoSieve Watch
        WKCompanionAppBundleIdentifier: com.fdenk.chronosieve
        WKWatchKitApp: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fdenk.chronosieve.watch

  ChronoSieveWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Sources/watchOS
      - path: Sources/Shared
    info:
      path: Resources/watchOS/ExtensionInfo.plist
      properties:
        CFBundleDisplayName: ChronoSieve Watch Extension
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: com.fdenk.chronosieve.watch
          NSExtensionPointIdentifier: com.apple.watchkit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fdenk.chronosieve.watch.extension

  ChronoSieveTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/iOS
    dependencies:
      - target: ChronoSieve
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fdenk.chronosieve.tests
        GENERATE_INFOPLIST_FILE: YES

  ChronoSieveUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/iOSUITests
    dependencies:
      - target: ChronoSieve
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fdenk.chronosieve.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: ChronoSieve

schemes:
  ChronoSieve:
    build:
      targets:
        ChronoSieve: all
        ChronoSieveTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ChronoSieveTests
  ChronoSieveWatch:
    build:
      targets:
        ChronoSieveWatch: all
    run:
      config: Debug
