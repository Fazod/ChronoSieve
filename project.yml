name: ChronoSieve
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    iOS: "26.0"
    watchOS: "10.0"
settings:
  base:
    SWIFT_VERSION: 5.10
    CODE_SIGN_STYLE: Automatic

targets:
  ChronoSieve:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/iOS
      - path: Sources/Shared
    info:
      path: Resources/iOS/Info.plist
      properties:
        CFBundleDisplayName: ChronoSieve
        UILaunchScreen: {}
        NSCalendarsUsageDescription: "ChronoSieve needs access to your calendars to filter and display events."
        NSCalendarsFullAccessUsageDescription: "ChronoSieve needs full access to your calendars to read and filter your events."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fdenk.chronosieve
        TARGETED_DEVICE_FAMILY: "1,2"

  ChronoSieveWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Sources/watchOS
      - path: Sources/Shared
    info:
      path: Resources/watchOS/Info.plist
      properties:
        CFBundleDisplayName: ChronoSieve Watch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fdenk.chronosieve.watch

  ChronoSieveTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/iOS
    dependencies:
      - target: ChronoSieve
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fdenk.chronosieve.tests
        GENERATE_INFOPLIST_FILE: YES

  ChronoSieveUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/iOSUITests
    dependencies:
      - target: ChronoSieve
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fdenk.chronosieve.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: ChronoSieve

schemes:
  ChronoSieve:
    build:
      targets:
        ChronoSieve: all
        ChronoSieveTests: [test]
        ChronoSieveUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ChronoSieveTests
        - ChronoSieveUITests
  ChronoSieveWatch:
    build:
      targets:
        ChronoSieveWatch: all
    run:
      config: Debug
